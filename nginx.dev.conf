events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Configuración de logs para desarrollo
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;

    # Configuración de compresión para desarrollo
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Configuración de caché para desarrollo (más permisiva)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    server {
        listen 80;
        server_name localhost;

        # Configuración específica para desarrollo
        root /usr/share/nginx/html;
        index index.html;

        # Configuración de CORS para desarrollo
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";

        # Manejo de rutas SPA para desarrollo
        location / {
            try_files $uri $uri/ /index.html;

            # Headers adicionales para desarrollo
            add_header X-Environment "development";
            add_header X-Build-Date $date_gmt;
        }

        # Configuración para archivos estáticos en desarrollo
        location /assets/ {
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }

        # Configuración para API en desarrollo (proxy opcional)
        location /api/ {
            proxy_pass http://192.168.1.139:8081/Enerlova/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Configuración de error pages para desarrollo
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
