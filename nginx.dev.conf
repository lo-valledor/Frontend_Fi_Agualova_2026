# Especificar ubicación del PID para usuario no-root
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Configuración de logs (más verbose que prod)
    log_format dev '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   'rt=$request_time';

    access_log /var/log/nginx/access.log dev;
    error_log /var/log/nginx/error.log warn;

    # Configuración de performance (igual que producción)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Compresión gzip (igual que producción)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Headers de seguridad (igual que producción)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Header adicional para identificar UAT
        add_header X-Environment "development" always;

        # Configuración para SPA (React Router)
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Cacheo de archivos estáticos (igual que producción)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable, no-transform";
            access_log off;
        }

        # Cacheo de fuentes
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Cacheo de imágenes
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
            expires 6M;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Deshabilitar logs para archivos comunes
        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }

        location = /robots.txt {
            access_log off;
            log_not_found off;
        }

        # Manejo de errores
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # Prevenir acceso a archivos ocultos
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Endpoint de health check
        location /health {
            access_log off;
            return 200 "healthy - UAT environment\n";
            add_header Content-Type text/plain;
        }
    }
}
