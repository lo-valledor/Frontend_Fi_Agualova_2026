# Especificar ubicación del PID para usuario no-root
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Compresión gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # ==================== SECURITY HEADERS ====================
        # Content Security Policy - Previene XSS y clickjacking
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*; frame-ancestors 'none';" always;

        # HTTP Strict Transport Security - Fuerza HTTPS (cuando esté configurado)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # X-Content-Type-Options - Previene MIME sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # X-Frame-Options - Previene clickjacking
        add_header X-Frame-Options "DENY" always;

        # X-XSS-Protection - Legacy XSS protection (navegadores antiguos)
        add_header X-XSS-Protection "1; mode=block" always;

        # Referrer-Policy - Controla información del referrer
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions-Policy - Previene acceso a features del navegador
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ==================== END SECURITY HEADERS ====================

        # Configuración para SPA
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        # Cacheo de archivos estáticos
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }

        # Manejo de errores
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # Configuración opcional para redirigir solicitudes API a tu backend
        location /login {
            proxy_pass https://enerlovauat.mmlovalledor.cl/Enerlova/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
