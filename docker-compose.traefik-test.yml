# docker-compose.traefik-test.yml
# Docker Compose para Traefik en ambiente TEST/UAT

services:
  traefik:
    image: traefik:v3
    container_name: traefik-test
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - DOCKER_API_VERSION=1.44
    networks:
      - proxy
    ports:
      - '80:80' # HTTP
      - '443:443' # HTTPS
      - '8080:8080' # Dashboard
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-test.yml:/traefik.yml:ro
      - ./traefik-config-test.yml:/config.yml:ro
      - ./acme.json:/acme.json
      - ./certs:/certs:ro # Certificados SSL auto-firmados
      - traefik_logs:/var/log/traefik
    labels:
      - 'traefik.enable=true'
      # Dashboard accesible en /dashboard
      - 'traefik.http.routers.traefik-dashboard.rule=Host(`enerlovauat.mmlovalledor.cl`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))'
      - 'traefik.http.routers.traefik-dashboard.service=api@internal'
      - 'traefik.http.routers.traefik-dashboard.entrypoints=websecure'
      - 'traefik.http.routers.traefik-dashboard.tls=true'

  # EJEMPLO: Frontend Enerlova
