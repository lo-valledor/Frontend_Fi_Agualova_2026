name: '🔍 CodeQL Security Analysis'

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '30 1 * * 0' # Semanal

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          # No subir a GitHub Security (requiere Advanced Security)
          upload: never
          output: codeql-results

      - name: 📤 Upload CodeQL Results as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-report
          path: codeql-results/*.sarif
          retention-days: 30

      - name: 📋 Summary
        run: |
          echo "## 🔍 CodeQL Analysis Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CodeQL analizó los archivos TypeScript/JavaScript del proyecto." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Los resultados SARIF están disponibles como artifact." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ℹ️ Para ver alertas en la pestaña Security, habilitar GitHub Advanced Security." >> $GITHUB_STEP_SUMMARY
