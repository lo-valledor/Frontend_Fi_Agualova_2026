name: 🔍 DAST Security Testing

on:
  # Baseline scan en PRs (rápido)
  pull_request:
    branches: [main, develop]

  # Full scan en push a main
  push:
    branches: [main]

  # Full scan semanal programado
  schedule:
    - cron: '0 4 * * 0' # Domingos a las 4:00 AM UTC

  # Permitir ejecución manual
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  dast:
    name: OWASP ZAP Automation Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🗂️ Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build project
        run: pnpm run build
        env:
          # Ajusta esto si tu build requiere saber la URL final,
          # pero para localhost suele bastar con dejarlo así o vacio.
          VITE_API_URL: http://localhost:8081

      - name: 🚀 Start server and wait
        run: |
          # 1. Iniciamos escuchando en 0.0.0.0 para que Docker (ZAP) pueda entrar
          nohup pnpm run start --host 0.0.0.0 > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server started with PID: $SERVER_PID"

          # 2. Esperamos a que el servidor responda
          echo "⏳ Waiting for server to start..."
          MAX_ATTEMPTS=60
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS..."
            
            # Curl local para verificar que levantó
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200\|301\|302"; then
              echo "✅ Server is ready and responding!"
              break
            fi
            
            # Verificar si el proceso murió
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "❌ Server process died. Checking logs..."
              cat server.log || true
              exit 1
            fi
            
            sleep 2
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ Server did not start in time. Logs:"
            cat server.log || true
            exit 1
          fi

      # --- AQUÍ EMPIEZA LA MAGIA DE ZAP ---
      
      - name: 🔍 OWASP ZAP Automation Scan
        uses: zaproxy/action-automation-scan@v0.3.0
        with:
          # Lee tu archivo de configuración zap.yaml
          plan_file: '.zap/zap.yaml'
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
        env:
          # Mapeamos los secretos de GitHub a las variables que usa zap.yaml
          ZAP_USER: ${{ secrets.ZAP_USER }}
          ZAP_PASS: ${{ secrets.ZAP_PASSWORD }} 

      # Fix de permisos para que GitHub Actions pueda leer el reporte generado por Docker
      - name: 🔧 Fix Report Permissions
        if: always()
        run: sudo chmod -R a+rwx .

      - name: 📋 Show server logs on failure
        if: failure()
        run: |
          echo "=== Server Logs ==="
          cat server.log || echo "No server logs found"

      - name: 📤 Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          # Debe coincidir con 'reportFile' definido en zap.yaml
          path: zap-report.html 
          retention-days: 30