name: 🔍 DAST Security Testing

on:
  # Baseline scan en PRs (rápido)
  pull_request:
    branches: [main, develop]

  # Full scan en push a main
  push:
    branches: [main]

  # Full scan semanal programado
  schedule:
    - cron: '0 4 * * 0' # Domingos a las 4:00 AM UTC

  # Permitir ejecución manual
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - full

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  dast:
    name: OWASP ZAP ${{ github.event_name == 'schedule' && 'Full' || 'Baseline' }} Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🗂️ Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build project
        run: pnpm run build
        env:
          VITE_API_URL: http://localhost:8081

      - name: 🚀 Start server and wait
        run: |
          # Start server in background
          nohup pnpm run start > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server started with PID: $SERVER_PID"

          # Wait for server to be ready
          echo "⏳ Waiting for server to start..."
          MAX_ATTEMPTS=60
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS..."
            
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200\|301\|302"; then
              echo "✅ Server is ready and responding!"
              curl -I http://localhost:3000 || true
              break
            fi
            
            # Check if process is still running
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "❌ Server process died. Checking logs..."
              cat server.log || true
              exit 1
            fi
            
            sleep 2
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ Server did not start in time. Logs:"
            cat server.log || true
            exit 1
          fi

          # Final verification
          echo "🔍 Final server verification:"
          curl -v http://localhost:3000 2>&1 | head -20 || true

      # Baseline scan para PRs (rápido, ~2-5 min)
      - name: 🔍 OWASP ZAP Baseline Scan
        if: github.event_name == 'pull_request'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false
        continue-on-error: true

      # Full scan para main y schedule (completo, ~15-30 min)
      - name: 🔍 OWASP ZAP Full Scan
        if: github.event_name != 'pull_request'
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false
        continue-on-error: true

      - name: 📋 Show server logs on failure
        if: failure()
        run: |
          echo "=== Server Logs ==="
          cat server.log || echo "No server logs found"

      - name: 📤 Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-${{ github.run_number }}
          path: report_*
          retention-days: 30
