name: 🔍 DAST Security Testing

on:
  # Baseline scan en PRs (rápido)
  pull_request:
    branches: [main, develop]

  # Full scan en push a main
  push:
    branches: [main]

  # Full scan semanal programado
  schedule:
    - cron: '0 4 * * 0' # Domingos a las 4:00 AM UTC

  # Permitir ejecución manual
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - full

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  dast:
    name: OWASP ZAP ${{ github.event_name == 'schedule' && 'Full' || 'Baseline' }} Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🗂️ Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build project
        run: pnpm run build
        env:
          VITE_API_URL: http://localhost:8081

      - name: 🚀 Start server
        run: |
          pnpm run start &
          echo "⏳ Waiting for server to start..."
          for i in {1..30}; do
            if curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Server is ready"
              break
            fi
            sleep 2
          done

      # Baseline scan para PRs (rápido, ~2-5 min)
      - name: 🔍 OWASP ZAP Baseline Scan
        if: github.event_name == 'pull_request'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false

      # Full scan para main y schedule (completo, ~15-30 min)
      - name: 🔍 OWASP ZAP Full Scan
        if: github.event_name != 'pull_request'
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false

      - name: 📤 Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-${{ github.run_number }}
          path: report_*
          retention-days: 30
