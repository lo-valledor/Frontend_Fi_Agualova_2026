name: Deploy to Development

# Workflows temporalmente deshabilitados - en standby
# Los depliegues automáticos están pausados
# Para habilitar, descomenta el bloque 'on' de abajo y comenta el 'workflow_dispatch'

# on:
#   push:
#     branches: [ develop ]
#   pull_request:
#     branches: [ develop ]

# Trigger manual únicamente - usar Actions tab en GitHub
on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment to development'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  deploy-development:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (opcional)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            enerlova/frontend:dev-latest
            enerlova/frontend:dev-${{ github.sha }}
          build-args: |
            VITE_API_URL=http://192.168.1.139:8082/Enerlova
            NODE_ENV=development
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to development server
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /path/to/your/app
            git pull origin develop
            docker-compose -f docker-compose.develop.yml down
            docker-compose -f docker-compose.develop.yml up --build -d
            docker system prune -f
