name: PR Validation

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9'
  IMAGE_NAME: agualova-frontend-pr

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI
        env:
          VITE_API_URL: ${{ vars.STAGING_API_URL || secrets.STAGING_API_URL || 'http://localhost:7071/Agualova' }}
          VITE_ENV_MODE: uat
          VITE_APP_ENV: staging
        run: pnpm run ci

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=/Agualova \
            --build-arg BACKEND_URL="${{ vars.STAGING_API_URL || secrets.STAGING_API_URL || 'http://localhost:7071/Agualova' }}" \
            --build-arg VITE_ENV_MODE=uat \
            --build-arg VITE_APP_ENV=staging \
            -t "${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}" \
            .
