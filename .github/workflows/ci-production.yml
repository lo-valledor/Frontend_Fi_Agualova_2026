name: 🚀 CI & Deploy Production (main)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

  push:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false   # nunca cancelar deploys a producción en curso

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9'
  VITE_ENV_MODE: production

jobs:
  # ============================================================================
  # CI — corre en todo PR y en push directo a main
  # ============================================================================
  ci:
    name: 🧪 CI
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'closed'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      # Ver nota en ci-staging.yml: el lockfile incluye tarballs sin
      # 'integrity' (xlsx desde CDN externo), por lo que debemos mantener
      # pnpm 9 alineado con ci-cd.yml existente.

      - name: 🔍 TypeScript typecheck
        run: pnpm run typecheck

      - name: 🧹 Lint (Biome)
        run: pnpm run lint

      - name: 🧪 Tests
        run: pnpm run test:run

      - name: 🏗️ Build
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VITE_HTTPS_ENABLED: 'true'
          VITE_SECURE_COOKIES: 'true'
        run: pnpm run build

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-production
          path: build/client/
          retention-days: 7

  # ============================================================================
  # Deploy production — sólo cuando un PR a main se ha mergeado
  #   o cuando hay un push directo a main (asumiendo protección de branch)
  # ============================================================================
  deploy-production:
    name: 🚀 Deploy Production
    needs: ci
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' &&
       github.event.action == 'closed' &&
       github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-production
          path: build/client/

      - name: 🔍 Verify build output
        run: |
          if [ ! -f build/client/index.html ]; then
            echo "❌ build/client/index.html not found"
            exit 1
          fi
          echo "✅ Build artifact OK"

      - name: 📦 Publish build artifact (retention 30d)
        uses: actions/upload-artifact@v4
        with:
          name: production-${{ github.sha }}
          path: build/client/
          retention-days: 30

      - name: 📊 Deploy Summary
        run: |
          echo "## 🚀 Production Deploy - ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama**: \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pendiente" >> $GITHUB_STEP_SUMMARY
          echo "El artefacto se publica en GitHub Actions. La promoción al" >> $GITHUB_STEP_SUMMARY
          echo "servidor de producción es manual (descargar artefacto o usar" >> $GITHUB_STEP_SUMMARY
          echo "el workflow \`ci-cd.yml\` existente que dispara el deploy-prod" >> $GITHUB_STEP_SUMMARY
          echo "job en el runner self-hosted de producción." >> $GITHUB_STEP_SUMMARY