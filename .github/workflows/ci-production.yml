name: CI & Deploy Production (main)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9'
  IMAGE_NAME: agualova-frontend
  CONTAINER_NAME: agualova-production
  HOST_PORT: '8080'

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Vite)
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL || 'http://localhost:8080/Agualova' }}
          VITE_ENV_MODE: production
          VITE_APP_ENV: production
          VITE_HTTPS_ENABLED: 'true'
          VITE_SECURE_COOKIES: 'true'
        run: pnpm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build & push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.PRODUCTION_API_URL || 'http://localhost:8080/Agualova' }}
            VITE_ENV_MODE=production
            VITE_APP_ENV=production

  deploy-production:
    name: Deploy Production
    needs: ci
    runs-on: [self-hosted, Linux, X64, production]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Stop & remove existing container
        run: |
          if docker ps -a --format '{{.Names}}' | grep -qx "${{ env.CONTAINER_NAME }}"; then
            echo "Stopping existing container ${{ env.CONTAINER_NAME }}"
            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm   "${{ env.CONTAINER_NAME }}" || true
          else
            echo "No existing container named ${{ env.CONTAINER_NAME }}"
          fi

      - name: Run new container
        run: |
          docker run -d \
            --name "${{ env.CONTAINER_NAME }}" \
            --restart unless-stopped \
            -p "${{ env.HOST_PORT }}:80" \
            --label com.github.project=agualova-frontend \
            --label com.github.environment=production \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Healthcheck
        run: |
          sleep 5
          STATUS=$(docker inspect --format='{{.State.Running}}' "${{ env.CONTAINER_NAME }}")
          if [ "$STATUS" != "true" ]; then
            echo "::error::Container ${{ env.CONTAINER_NAME }} is not running"
            docker logs "${{ env.CONTAINER_NAME }}"
            exit 1
          fi
          curl -fsS "http://localhost:${{ env.HOST_PORT }}/health"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Deploy failed, removing broken container"
          docker rm -f "${{ env.CONTAINER_NAME }}" || true
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}" \
            | head -n -5 \
            | xargs -r docker rmi || true

      - name: Deploy summary
        if: success()
        run: |
          {
            echo "## Production Deploy - ${{ github.sha }}"
            echo ""
            echo "- **Branch**: \`main\`"
            echo "- **Image**: \`ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\` (also tagged \`latest\`)"
            echo "- **Container**: \`${{ env.CONTAINER_NAME }}\` on port \`${{ env.HOST_PORT }}\`"
            echo "- **Runner**: self-hosted (Linux, X64, production)"
            echo "- **Digest**: \`${{ needs.ci.outputs.image-digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"