name: SonarQube Scan - Production Only

on:
  push:
    branches:
      - main # Solo se ejecuta en la rama principal de producción

jobs:
  sonar:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: http://192.168.1.139:9000
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=lo-valledor_Frontend_Fi_Enerlova_2025
            -Dsonar.projectBaseDir=.
            # opcional: pinnea versión del scanner
            # el input 'scanner-version' no es válido, se debe usar un scanner personalizado o la versión por defecto de la acción.
            # si quieres args extra, añádelos aquí. Ejemplo: -Dsonar.sources=src
