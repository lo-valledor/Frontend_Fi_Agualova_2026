name: Development Environment Build

on:
  push:
    branches:
      - develop # Solo se ejecuta en la rama de desarrollo
  pull_request:
    branches:
      - develop

jobs:
  development-build:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build for development
        run: pnpm run build
        env:
          VITE_API_URL: http://192.168.1.139:8081/Enerlova
          NODE_ENV: development

      - name: Build Docker development image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://192.168.1.139:8081/Enerlova \
            --build-arg NODE_ENV=development \
            -t enerlova-frontend:dev \
            -f Dockerfile.dev .

      - name: Deploy to development environment
        run: |
          docker-compose -f docker-compose.dev.yml down
          docker-compose -f docker-compose.dev.yml up -d
