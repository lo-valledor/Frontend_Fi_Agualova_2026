name: CI & Deploy Staging (develop)

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9'
  IMAGE_NAME: agualova-frontend
  CONTAINER_NAME: agualova-staging
  HOST_PORT: '8081'

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Quality check
        run: pnpm run check

      - name: Unit tests
        run: pnpm run test:run

      - name: Build (Vite)
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL || 'http://localhost:8081/Agualova' }}
          VITE_ENV_MODE: uat
          VITE_APP_ENV: staging
        run: pnpm run build

  deploy-staging:
    name: Deploy Staging
    needs: ci
    runs-on: [self-hosted, Linux, X64, staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL="${{ secrets.STAGING_API_URL || 'http://localhost:8081/Agualova' }}" \
            --build-arg VITE_ENV_MODE=uat \
            --build-arg VITE_APP_ENV=staging \
            -t "${{ env.IMAGE_NAME }}:local" \
            -t "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" \
            .

      - name: Stop & remove existing container
        run: |
          if docker ps -a --format '{{.Names}}' | grep -qx "${{ env.CONTAINER_NAME }}"; then
            echo "Stopping existing container ${{ env.CONTAINER_NAME }}"
            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm   "${{ env.CONTAINER_NAME }}" || true
          else
            echo "No existing container named ${{ env.CONTAINER_NAME }}"
          fi

      - name: Run new container
        run: |
          docker run -d \
            --name "${{ env.CONTAINER_NAME }}" \
            --restart unless-stopped \
            -p "${{ env.HOST_PORT }}:80" \
            --label com.github.project=agualova-frontend \
            --label com.github.environment=staging \
            "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"

      - name: Healthcheck
        run: |
          sleep 5
          STATUS=$(docker inspect --format='{{.State.Running}}' "${{ env.CONTAINER_NAME }}")
          if [ "$STATUS" != "true" ]; then
            echo "::error::Container ${{ env.CONTAINER_NAME }} is not running"
            docker logs "${{ env.CONTAINER_NAME }}"
            exit 1
          fi
          curl -fsS "http://localhost:${{ env.HOST_PORT }}/health"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Deploy failed, removing broken container"
          docker rm -f "${{ env.CONTAINER_NAME }}" || true
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep "${{ env.IMAGE_NAME }}" \
            | grep -v ':local$' \
            | head -n -5 \
            | xargs -r docker rmi || true

      - name: Deploy summary
        if: success()
        run: |
          {
            echo "## Staging Deploy - ${{ github.sha }}"
            echo ""
            echo "- **Branch**: \`develop\`"
            echo "- **Image**: \`${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\` (built locally on runner)"
            echo "- **Container**: \`${{ env.CONTAINER_NAME }}\` on port \`${{ env.HOST_PORT }}\`"
            echo "- **Runner**: self-hosted (Linux, X64, staging)"
          } >> "$GITHUB_STEP_SUMMARY"
