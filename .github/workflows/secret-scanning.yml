name: '🔑 Secret Scanning'

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para escanear todo el historial

      - name: 🔑 TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: 📋 Summary
        if: always()
        run: |
          echo "## 🔑 Secret Scanning Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "TruffleHog ha escaneado el repositorio en busca de:" >> $GITHUB_STEP_SUMMARY
          echo "- API Keys" >> $GITHUB_STEP_SUMMARY
          echo "- Tokens de acceso" >> $GITHUB_STEP_SUMMARY
          echo "- Credenciales de bases de datos" >> $GITHUB_STEP_SUMMARY
          echo "- Claves privadas" >> $GITHUB_STEP_SUMMARY
          echo "- Otros secretos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Si no hay errores arriba, no se encontraron secretos expuestos." >> $GITHUB_STEP_SUMMARY
