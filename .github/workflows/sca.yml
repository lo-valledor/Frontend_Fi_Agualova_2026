name: '🔐 SCA - Dependency Security Scan'

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Ejecutar diariamente a las 6:00 AM UTC para detectar nuevas vulnerabilidades
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🗂️ Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      # Audit de seguridad con pnpm (detecta vulnerabilidades conocidas)
      - name: 🔍 Run pnpm audit
        run: |
          echo "## 🔍 Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Ejecutar audit y capturar resultado
          if pnpm audit --audit-level=moderate 2>&1 | tee audit-output.txt; then
            echo "✅ No se encontraron vulnerabilidades de nivel moderado o superior" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Se encontraron vulnerabilidades. Revisa los detalles abajo:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat audit-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            # No fallar el job para vulnerabilidades moderadas, solo para críticas
            pnpm audit --audit-level=critical
          fi
        continue-on-error: false

      # Análisis de licencias
      - name: 📋 Check licenses
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 License Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Listar dependencias principales
          echo "### Dependencias principales:" >> $GITHUB_STEP_SUMMARY
          pnpm list --depth=0 --json | head -100 >> $GITHUB_STEP_SUMMARY || true

      # Detectar dependencias desactualizadas con vulnerabilidades
      - name: 📊 Check outdated packages
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Outdated Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Paquetes que podrían necesitar actualización:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm outdated 2>&1 | head -50 >> $GITHUB_STEP_SUMMARY || echo "Todos los paquetes están actualizados" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

  # Job adicional para escaneo profundo con Snyk (opcional, requiere SNYK_TOKEN)
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    # Solo ejecutar si existe el token de Snyk
    if: ${{ vars.ENABLE_SNYK == 'true' }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: 📤 Upload Snyk results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
        continue-on-error: true
