name: 🚀 CI/CD Pipeline

on:
  # Ejecutar en pull requests a cualquier rama
  pull_request:
    branches: ["*"]

  # Ejecutar en push a ramas principales
  push:
    branches:
      - main
      - master

  # Permitir ejecución manual
  workflow_dispatch:

env:
  # Configuración de Node.js y pnpm
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # 🔍 Job de Integración Continua
  ci:
    name: 🧪 Continuous Integration
    runs-on: ubuntu-latest

    steps:
      # Checkout del código
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # Configurar Node.js
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Instalar pnpm
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      # Configurar cache de pnpm
      - name: 💾 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🗂️ Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Instalar dependencias
      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      # Verificación de tipos TypeScript
      - name: 🔍 Type checking
        run: pnpm run typecheck

      # Linting (si existe script de lint)
      - name: 🧹 ESLint
        run: |
          if grep -q '"lint"' package.json; then
            pnpm run lint
          else
            echo "⚠️ No lint script found, skipping..."
            npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0 || echo "⚠️ ESLint not configured or failed"
          fi

      # Tests unitarios
      - name: 🧪 Run tests
        run: pnpm run test:run

      # Build del proyecto
      - name: 🏗️ Build project
        run: pnpm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Subir artefactos de build (opcional)
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/
          retention-days: 1

    # 🚀 Job de Despliegue Continuo (solo para rama principal)
  deploy:
    name: 🚀 Deploy to Production
    needs: ci
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      # Checkout del código
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # Construir imagen Docker
      - name: 🏗️ Build Docker image
        run: |
          echo "🏗️ Building Docker image..."
          docker build -t enerlova-frontend:latest \
            --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            --build-arg VITE_ENV_MODE=production .

      # Detener contenedor anterior
      - name: 🛑 Stop previous container
        run: |
          echo "🛑 Stopping previous container..."
          docker stop enerlova-frontend-prod || true
          docker rm enerlova-frontend-prod || true

      # Ejecutar nuevo contenedor
      - name: 🚀 Run new container
        run: |
          echo "🚀 Starting new container..."
          docker run -d \
            --name enerlova-frontend-prod \
            --restart unless-stopped \
            -p 8080:80 \
            --log-driver json-file \
            --log-opt max-size=10m \
            --log-opt max-file=3 \
            enerlova-frontend:latest

      # Verificar que el despliegue fue exitoso
      - name: 🔍 Health check
        run: |
          echo "🔍 Performing health check..."
          echo "⏳ Waiting for service to start..."

          # Esperar y hacer múltiples intentos
          for i in {1..15}; do
            echo "🔄 Attempt $i/15..."
            if curl -f http://localhost:8080 > /dev/null 2>&1; then
              echo "✅ Deployment successful! Service is responding on port 8080"
              echo "🌐 Application URL: http://192.168.1.139:8080"
              break
            else
              echo "⏳ Service not ready yet, waiting 5 seconds..."
              sleep 5
            fi

            # Si es el último intento y falló
            if [ $i -eq 15 ]; then
              echo "❌ Deployment failed - service not responding after 15 attempts"
              echo "🔍 Checking Docker container status..."
              docker ps -a
              echo "📋 Checking container logs..."
              docker logs --tail=50 enerlova-frontend-prod || echo "Container not found"
              echo "🧹 Cleaning up failed container..."
              docker stop enerlova-frontend-prod || true
              docker rm enerlova-frontend-prod || true
              exit 1
            fi
          done

      # Limpiar imágenes Docker antiguas
      - name: 🧹 Clean old Docker images
        run: |
          echo "🧹 Cleaning old Docker images..."
          docker image prune -f || true
