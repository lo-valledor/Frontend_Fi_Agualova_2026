name: 🚀 CI/CD Frontend

on:
  # Ejecutar en pull requests a cualquier rama
  pull_request:
    branches: ['*']

  # Ejecutar en push a ramas principales
  push:
    branches:
      - main
      - master

  # Permitir ejecución manual
  workflow_dispatch:

env:
  # Configuración de Node.js y pnpm
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  IMAGE_NAME: lovalledor/enerlova-frontend
  IMAGE_TAG: ${{ github.sha }}

  # ============================================
  # 🔧 CONFIGURACIÓN DE DESPLIEGUE
  # ============================================
  # Cambiar a 'kubernetes' cuando esté listo el entorno de DevOps
  DEPLOY_TARGET: 'docker' # Opciones: 'docker' | 'kubernetes'
  # ============================================

jobs:
  # 🔍 Job de Integración Continua
  ci:
    name: 🧪 Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🗂️ Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type checking
        run: pnpm run typecheck

      - name: 🧹 ESLint
        run: |
          if grep -q '"lint"' package.json; then
            pnpm run lint
          else
            echo "⚠️ No lint script found, skipping..."
            npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0 || echo "⚠️ ESLint not configured or failed"
          fi

      - name: 🧪 Run tests
        run: pnpm run test:run

      - name: 🔐 Security Audit
        run: |
          echo "🔍 Running security audit..."
          pnpm audit --audit-level=moderate || echo "⚠️ Vulnerabilities found, please review"

      - name: 🏗️ Build project (Frontend)
        run: pnpm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/
          retention-days: 1

  # ============================================
  # 🐳 DESPLIEGUE FASE 1: DESARROLLO (AUTOMÁTICO)
  # ============================================
  deploy-dev:
    name: 🧪 Build & Deploy to Development
    needs: ci
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      github.event_name == 'push' &&
      vars.DEPLOY_TARGET != 'kubernetes'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/

      - name: 🏗️ Build Docker image (Development)
        run: |
          echo "🚀 Construyendo imagen Docker para DESARROLLO..."
          docker build -t enerlova-frontend:dev -f Dockerfile .

      - name: 📋 Show image info
        run: docker images | grep enerlova-frontend

      - name: 📊 Build Summary
        run: |
          echo "## 🧪 Development Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build completado exitosamente" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Detalles:" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagen**: \`enerlova-frontend:dev\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 La imagen está lista para ser desplegada en el servidor de desarrollo." >> $GITHUB_STEP_SUMMARY

  # ============================================
  # 🐳 DESPLIEGUE FASE 2: PRODUCCIÓN (MANUAL)
  # ============================================
  deploy-prod:
    name: 🚀 Deploy to Production
    needs: ci
    runs-on: ubuntu-latest
    # Solo ejecutar si se dispara manualmente (workflow_dispatch)
    if: |
      github.event_name == 'workflow_dispatch' &&
      vars.DEPLOY_TARGET != 'kubernetes'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/

      - name: 🏗️ Build Docker image (Production)
        run: |
          echo "🚀 Construyendo imagen Docker para PRODUCCIÓN..."
          docker build -t enerlova-frontend:prod \
            --build-arg VITE_APP_ENV=production \
            -f Dockerfile .

      - name: 📋 Show image info
        run: docker images | grep enerlova-frontend

      - name: 📊 Production Build Summary
        run: |
          echo "## 🚀 Production Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build de PRODUCCIÓN completado exitosamente" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Detalles:" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagen**: \`enerlova-frontend:prod\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Ejecutado por**: \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ ATENCIÓN: Esta es una versión de PRODUCCIÓN. Verifica antes de desplegar." >> $GITHUB_STEP_SUMMARY

  # ============================================
  # ☸️ DESPLIEGUE CON KUBERNETES (STAND-BY)
  # ============================================
  # Para activar Kubernetes:
  # 1. Cambiar DEPLOY_TARGET a 'kubernetes' arriba
  # 2. O crear una variable de repositorio DEPLOY_TARGET = 'kubernetes'
  # 3. Configurar los secrets: DOCKER_USERNAME, DOCKER_PASSWORD, KUBE_CONFIG_BASE64

  build-and-push-docker:
    name: 🏗️ Build & Push Docker Image (K8s)
    needs: ci
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.DEPLOY_TARGET == 'kubernetes'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/

      - name: 🏗️ Show downloaded files
        run: ls -la build/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          build-args: |
            VITE_API_URL=http://192.168.1.139:32011/Enerlova
            VITE_APP_ENV=production

  deploy-kubernetes:
    name: ☸️ Deploy to Kubernetes
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.DEPLOY_TARGET == 'kubernetes'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update Frontend Deployment
        run: |
          echo "🔄 Updating Kubernetes Deployment..."
          kubectl set image deployment/enerlova-frontend \
            enerlova-frontend=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -n apps

          echo "⏳ Waiting for Deployment rollout to complete..."
          kubectl rollout status deployment/enerlova-frontend -n apps

          echo "✅ Deployment successful!"
          echo "🌐 Application URL: http://192.168.1.139:32010"

      - name: Clean up Kubeconfig
        if: always()
        run: rm -rf ~/.kube
