name: 🚀 CI/CD Frontend

on:
  # Ejecutar en pull requests a cualquier rama
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

  # Ejecutar en push a ramas principales y test (CI + deploy-test en test)
  push:
    branches:
      - main
      - master
      - test

  # Permitir ejecución manual
  workflow_dispatch:

env:
  # Configuración de Node.js y pnpm
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  IMAGE_NAME: lovalledor/enerlova-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # 🔍 Job de Integración Continua
  ci:
    name: 🧪 Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🗂️ Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type checking
        run: pnpm run typecheck

      - name: 🧹 ESLint
        run: |
          if grep -q '"lint"' package.json; then
            pnpm run lint
          else
            echo "⚠️ No lint script found, skipping..."
            npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0 || echo "⚠️ ESLint not configured or failed"
          fi

      - name: 🧪 Run tests
        run: pnpm run test:run

      - name: 🔐 Security Audit
        run: |
          echo "🔍 Running security audit..."
          pnpm audit --audit-level=moderate || echo "⚠️ Vulnerabilities found, please review"

      - name: 🏗️ Build project (Frontend)
        run: pnpm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/
          retention-days: 1

  # ============================================
  # 🐳 DESPLIEGUE FASE 1: TEST (AUTOMÁTICO EN PUSH)
  # ============================================
  # Build de imagen en el runner. Despliegue manual en 192.168.1.197 (test) y 192.168.1.183 (prod).
  deploy-test:
    name: 🧪 Build & Deploy to Test
    needs: ci
    runs-on: [self-hosted, Linux, X64, deploy-test, frontend-runner]
    if: |
      github.ref == 'refs/heads/test' &&
      github.event_name == 'push'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/

      - name: 🏗️ Build Docker image (Test)
        run: |
          echo "🚀 Construyendo imagen Docker para TEST..."
          docker build \
            -t enerlova-frontend:dev \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:test \
            -f Dockerfile .

      - name: 📋 Show image info
        run: docker images | grep -E "enerlova-frontend|lovalledor"

      - name: 🐳 Push to Docker Hub (opcional)
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:test
          echo "IMAGE_PUSHED=true" >> $GITHUB_ENV
          echo "IMAGE_URL=docker.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV

      - name: 🐳 Deploy container (Test)
        run: |
          echo "🚀 Levantando contenedor TEST con docker compose..."
          docker compose -f docker-compose.test.yml up -d --build
          echo "📋 Contenedores Enerlova (TEST):"
          docker ps --filter "name=enerlova-frontend-test" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: 📊 Build Summary
        run: |
          echo "## 🧪 Deploy Test - Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Imagen construida correctamente (solo en el runner)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Detalles:" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🖥️ Despliegue manual" >> $GITHUB_STEP_SUMMARY
          echo "- **Test**: 192.168.1.197" >> $GITHUB_STEP_SUMMARY
          echo "- **Prod**: 192.168.1.183" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # 🐳 DESPLIEGUE FASE 2: PRODUCCIÓN (MANUAL)
  # ============================================
  deploy-prod:
    name: 🚀 Deploy to Production
    needs: ci
    runs-on: [self-hosted, Linux, X64, deploy-prod, enerlova-runner]
    # Ejecutar cuando un PR hacia main se mergea
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/

      - name: 🏗️ Build Docker image (Production)
        run: |
          echo "🚀 Construyendo imagen Docker para PRODUCCIÓN..."
          docker build -t enerlova-frontend:prod \
            --build-arg VITE_APP_ENV=production \
            -f Dockerfile .

      - name: 📋 Show image info
        run: docker images | grep enerlova-frontend

      - name: 🐳 Deploy container (Production)
        run: |
          echo "🚀 Levantando contenedor PROD con docker compose..."
          docker compose -f docker-compose.prod.yml up -d --build
          echo "📋 Contenedores Enerlova (PROD):"
          docker ps --filter "name=enerlova-frontend-prod" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: 📊 Production Build Summary
        run: |
          echo "## 🚀 Production Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build de PRODUCCIÓN completado exitosamente" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Detalles:" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagen**: \`enerlova-frontend:prod\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Ejecutado por**: \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🖥️ Servidor PROD (desplegar aquí)" >> $GITHUB_STEP_SUMMARY
          echo "- **IP**: \`192.168.1.183\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ Verifica antes de desplegar en 192.168.1.183." >> $GITHUB_STEP_SUMMARY
