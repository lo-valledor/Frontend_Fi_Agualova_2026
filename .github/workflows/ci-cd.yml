name: 🚀 CI/CD Frontend

on:
  # Ejecutar en pull requests a cualquier rama
  pull_request:
    branches: ['*']

  # Ejecutar en push a ramas principales
  push:
    branches:
      - main
      - master

  # Permitir ejecución manual
  workflow_dispatch:

env:
  # Configuración de Node.js y pnpm
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  IMAGE_NAME: lovalledor/enerlova-frontend
  IMAGE_TAG: ${{ github.sha }}

  # ============================================
  # 🔧 CONFIGURACIÓN DE DESPLIEGUE
  # ============================================
  # Cambiar a 'kubernetes' cuando esté listo el entorno de DevOps
  DEPLOY_TARGET: 'docker' # Opciones: 'docker' | 'kubernetes'
  # ============================================

jobs:
  # 🔍 Job de Integración Continua
  ci:
    name: 🧪 Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🗂️ Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type checking
        run: pnpm run typecheck

      - name: 🧹 ESLint
        run: |
          if grep -q '"lint"' package.json; then
            pnpm run lint
          else
            echo "⚠️ No lint script found, skipping..."
            npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0 || echo "⚠️ ESLint not configured or failed"
          fi

      - name: 🧪 Run tests
        run: pnpm run test:run

      - name: 🔐 Security Audit
        run: |
          echo "🔍 Running security audit..."
          pnpm audit --audit-level=moderate || echo "⚠️ Vulnerabilities found, please review"

      - name: 🏗️ Build project (Frontend)
        run: pnpm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/
          retention-days: 1

  # ============================================
  # 🐳 DESPLIEGUE FASE 1: TEST (AUTOMÁTICO)
  # ============================================
  deploy-test:
    name: 🧪 Build & Deploy to Test
    needs: ci
    runs-on: [self-hosted, frontend-runner]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.DEPLOY_TARGET != 'kubernetes'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Deploy Test Environment
        run: |
          echo "🚀 Desplegando a entorno de TEST..."
          echo "📦 Puerto Frontend: 32010 | Backend: enerlovauat.mmlovalledor.cl:32011"

          # Limpiar cualquier proceso ocupando el puerto 32010
          echo "🧹 Verificando puerto 32010..."
          if docker ps -q --filter "publish=32010" | grep -q .; then
            echo "⚠️ Encontrado contenedor bloqueando puerto 32010. Deteniendo..."
            docker ps -q --filter "publish=32010" | xargs -r docker rm -f
          fi

          # Detener contenedores anteriores si existen
          docker compose -p enerlova_test -f docker-compose.test.yml down --remove-orphans || true

          # Construir y levantar
          docker compose -p enerlova_test -f docker-compose.test.yml up --build -d

          echo "✅ Despliegue de TEST completado!"
          echo "🌐 URL: http://localhost:32010"

      - name: 🔍 Verify Test Deployment
        run: |
          echo "⏳ Verificando salud del contenedor de test..."
          sleep 10
          if docker ps | grep -q enerlova-frontend-test; then
            echo "✅ Contenedor Test Running"
          else
            echo "❌ Error: Contenedor Test falló al iniciar"
            docker logs enerlova-frontend-test 2>&1 || true
            exit 1
          fi

      - name: 🧹 Cleanup
        run: docker image prune -f
        continue-on-error: true

  # ============================================
  # 🐳 DESPLIEGUE FASE 2: PRODUCCIÓN (MANUAL)
  # ============================================
  deploy-prod:
    name: 🚀 Approve & Deploy to Prod
    # No depende estrictamente de 'deploy-test' en términos de ejecución técnica,
    # pero lógicamente es el paso siguiente.
    needs: ci
    runs-on: [self-hosted, enerlova-runner]
    # Solo ejecutar si se dispara manualmente (workflow_dispatch)
    if: |
      github.event_name == 'workflow_dispatch' &&
      vars.DEPLOY_TARGET != 'kubernetes'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Deploy Production Environment
        run: |
          echo "🚀 Desplegando a entorno de PRODUCCIÓN..."
          echo "📦 Puerto Frontend: 32010 | Backend: enerlova.mmlovalledor.cl:32011"

          # Limpiar cualquier proceso ocupando el puerto 32010
          echo "🧹 Verificando puerto 32010..."
          if docker ps -q --filter "publish=32010" | grep -q .; then
            echo "⚠️ Encontrado contenedor bloqueando puerto 32010. Deteniendo..."
            docker ps -q --filter "publish=32010" | xargs -r docker rm -f
          fi

          # Detener contenedores anteriores
          docker compose -p enerlova_prod -f docker-compose.prod.yml down --remove-orphans || true

          # Construir y levantar
          docker compose -p enerlova_prod -f docker-compose.prod.yml up --build -d

          echo "✅ Despliegue de PRODUCCIÓN completado!"
          echo "🌐 URL: http://localhost:32010"

      - name: 🔍 Verify Prod Deployment
        run: |
          echo "⏳ Verificando salud del contenedor de producción..."
          sleep 10
          if docker ps | grep -q enerlova-frontend-prod; then
            echo "✅ Contenedor Prod Running"
          else
            echo "❌ Error: Contenedor Prod falló al iniciar"
            docker logs enerlova-frontend-prod 2>&1 || true
            exit 1
          fi

      - name: 🧹 Cleanup
        run: docker image prune -f
        continue-on-error: true

  # ============================================
  # ☸️ DESPLIEGUE CON KUBERNETES (STAND-BY)
  # ============================================
  # Para activar Kubernetes:
  # 1. Cambiar DEPLOY_TARGET a 'kubernetes' arriba
  # 2. O crear una variable de repositorio DEPLOY_TARGET = 'kubernetes'
  # 3. Configurar los secrets: DOCKER_USERNAME, DOCKER_PASSWORD, KUBE_CONFIG_BASE64

  build-and-push-docker:
    name: 🏗️ Build & Push Docker Image (K8s)
    needs: ci
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.DEPLOY_TARGET == 'kubernetes'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/

      - name: 🏗️ Show downloaded files
        run: ls -la build/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          build-args: |
            VITE_API_URL=http://192.168.1.139:32011/Enerlova
            VITE_APP_ENV=production

  deploy-kubernetes:
    name: ☸️ Deploy to Kubernetes
    needs: build-and-push-docker
    runs-on: self-hosted
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.DEPLOY_TARGET == 'kubernetes'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update Frontend Deployment
        run: |
          echo "🔄 Updating Kubernetes Deployment..."
          kubectl set image deployment/enerlova-frontend \
            enerlova-frontend=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -n apps

          echo "⏳ Waiting for Deployment rollout to complete..."
          kubectl rollout status deployment/enerlova-frontend -n apps

          echo "✅ Deployment successful!"
          echo "🌐 Application URL: http://192.168.1.139:32010"

      - name: Clean up Kubeconfig
        if: always()
        run: rm -rf ~/.kube
