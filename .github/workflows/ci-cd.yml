name: 🚀 CI/CD Frontend to Kubernetes

on:
  # Ejecutar en pull requests a cualquier rama
  pull_request:
    branches: ['*']

  # Ejecutar en push a ramas principales
  push:
    branches:
      - main
      - master

  # Permitir ejecución manual
  workflow_dispatch:

env:
  # Configuración de Node.js y pnpm
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  IMAGE_NAME: lovalledor/enerlova-frontend # <--- ¡Tu usuario de Docker Hub!
  IMAGE_TAG: ${{ github.sha }} # <--- Usar el SHA del commit para la tag de la imagen
  # KUBERNETES_NAMESPACE: apps # Definido directamente en el script kubectl

jobs:
  # 🔍 Job de Integración Continua (sin cambios mayores, se mantiene)
  ci:
    name: 🧪 Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🗂️ Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type checking
        run: pnpm run typecheck

      - name: 🧹 ESLint
        run: |
          if grep -q '"lint"' package.json; then
            pnpm run lint
          else
            echo "⚠️ No lint script found, skipping..."
            npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0 || echo "⚠️ ESLint not configured or failed"
          fi

      - name: 🧪 Run tests
        run: pnpm run test:run

      - name: 🔐 Security Audit
        run: |
          echo "🔍 Running security audit..."
          pnpm audit --audit-level=moderate || echo "⚠️ Vulnerabilities found, please review"

      # El build del proyecto debe reflejar la URL de la API en Kubernetes
      # No uses VITE_API_URL en el CI build si el deploy lo hace en otra fase.
      # Lo definiremos en el job 'build-and-push-docker' para el Dockerfile.
      - name: 🏗️ Build project (Frontend)
        run: pnpm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/ # Asegúrate de que esta es la ruta de los archivos estáticos de tu React
          retention-days: 1

  # 🚀 Job de Construcción y Push de Imagen Docker (NUEVO)
  build-and-push-docker:
    name: 🏗️ Build & Push Docker Image
    needs: ci # Depende del job de CI
    runs-on: ubuntu-latest # Se puede usar un runner de GitHub, no necesita ser self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # Descargar los artefactos del build del job 'ci'
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: build/ # Donde se descargan los archivos estáticos

      - name: 🏗️ Show downloaded files
        run: ls -la build/ # Para verificar que los archivos están ahí

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # <--- Configura este SECRET en GitHub
          password: ${{ secrets.DOCKER_PASSWORD }} # <--- Configura este SECRET en GitHub

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # Tu Dockerfile debe estar en la raíz de tu repo de frontend
          file: Dockerfile # O Dockerfile.prod, según cuál uses para K8s
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          build-args: |
            VITE_API_URL=http://192.168.1.139:32011/Enerlova
            VITE_APP_ENV=production
          # Necesitas una Dockerfile que copie los archivos de 'build/'

  # 🚀 Job de Despliegue Continuo a Kubernetes (REEMPLAZA tu deploy anterior)
  deploy:
    name: 🚀 Deploy to Kubernetes
    needs: build-and-push-docker # Ahora depende del job de build de la imagen
    runs-on: self-hosted # Puede ser un runner de GitHub si tiene acceso a tu K8s API
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 🔐 Configurar acceso a Kubernetes con Kubeconfig
      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          # El SECRET KUBE_CONFIG_BASE64 contiene tu kubeconfig codificado en base64
          echo "${{ secrets.KUBE_CONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          # Opcional: Si tu kubeconfig tiene múltiples contextos, selecciona el predeterminado
          # kubectl config use-context default-context

      # 🔄 Actualizar el Deployment en Kubernetes
      - name: Update Frontend Deployment
        run: |
          echo "🔄 Updating Kubernetes Deployment..."
          # Usamos kubectl set image para actualizar la imagen del contenedor 'enerlova-frontend'
          # dentro del Deployment 'enerlova-frontend' en el namespace 'apps'.
          kubectl set image deployment/enerlova-frontend \
            enerlova-frontend=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -n apps

          echo "⏳ Waiting for Deployment rollout to complete..."
          kubectl rollout status deployment/enerlova-frontend -n apps

          echo "✅ Deployment successful!"
          echo "🌐 Application URL: http://192.168.1.139:32010"

      # 🧹 Limpiar kubeconfig (buena práctica de seguridad)
      - name: Clean up Kubeconfig
        if: always()
        run: rm -rf ~/.kube
