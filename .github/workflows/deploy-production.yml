name: Deploy to Production

# Workflows temporalmente deshabilitados - en standby
# Los depliegues automáticos están pausados
# Para habilitar, descomenta el bloque 'on' de abajo y comenta el 'workflow_dispatch'

# on:
#   push:
#     branches: [ main ]
#   pull_request:
#     branches: [ main ]

# Trigger manual únicamente - usar Actions tab en GitHub
on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deployment to production"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (opcional)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            enerlova/frontend:latest
            enerlova/frontend:prod-${{ github.sha }}
          build-args: |
            VITE_API_URL=http://192.168.1.139:8081/Enerlova
            NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production server
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /path/to/your/app
            git pull origin main
            if docker compose version >/dev/null 2>&1; then COMPOSE="docker compose"; elif command -v docker-compose >/dev/null 2>&1; then COMPOSE="docker-compose"; else echo "Docker Compose no disponible"; exit 1; fi
            # Despliegue idempotente sin detener dev
            $COMPOSE -p enerlova_prod -f docker-compose.prod.yml up -d --build
            docker image prune -f || true
