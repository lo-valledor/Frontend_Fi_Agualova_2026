# docker-compose.multi.yml - Ambos entornos simultáneos
# Uso: docker-compose -f docker-compose.multi.yml up -d --build
version: "3.8"

services:
  # PRODUCCIÓN - Puerto 8080 (Colores azules, sin badge)
  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://192.168.1.139:8081/Enerlova
        VITE_API_ENERLINK_URL: http://192.168.1.139:8081/api
        VITE_ENV_MODE: production
    ports:
      - "8080:80"
    container_name: enerlova-frontend-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_ENV_MODE=production
    networks:
      - enerlova-network

  # DESARROLLO/PRUEBAS - Puerto 4200 (Colores naranjas, badge DEV)
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development-nginx
      args:
        VITE_API_URL: http://192.168.1.139:8082/Enerlova
        VITE_API_ENERLINK_URL: http://192.168.1.139:8082/api
        VITE_ENV_MODE: development
        NODE_ENV: development
    ports:
      - "4200:80"
    container_name: enerlova-frontend-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - VITE_ENV_MODE=development
    networks:
      - enerlova-network

networks:
  enerlova-network:
    driver: bridge
