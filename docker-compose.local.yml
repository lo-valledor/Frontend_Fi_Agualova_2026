# ============================================
# Docker Compose - Desarrollo Local con Hot Reload
# ============================================
#
# SOLO para desarrollo activo local con hot reload
# NO usar para UAT ni producción
#
# Uso:
#   docker-compose -f docker-compose.local.yml up --build
#
# IMPORTANTE: Para la mayoría de casos, es mejor usar directamente:
#   pnpm dev
#
version: "3.8"

services:
  frontend-local:
    build:
      context: .
      dockerfile: Dockerfile.local
      args:
        VITE_API_URL: ${VITE_API_URL:-http://192.168.1.139:8081/Enerlova}
        NODE_ENV: development
        VITE_APP_ENV: development

    image: enerlova-frontend:local-dev

    container_name: enerlova-frontend-local

    ports:
      - "${LOCAL_PORT:-5173}:5173"

    volumes:
      # Montar código fuente para hot reload
      - ./app:/app/app
      - ./public:/app/public
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      # Preservar node_modules del contenedor
      - /app/node_modules

    environment:
      - NODE_ENV=development
      - VITE_API_URL=${VITE_API_URL:-http://192.168.1.139:8081/Enerlova}
      - VITE_APP_ENV=development

    networks:
      - enerlova-local-network

    restart: unless-stopped

    # Logging ligero para desarrollo
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"

networks:
  enerlova-local-network:
    driver: bridge
