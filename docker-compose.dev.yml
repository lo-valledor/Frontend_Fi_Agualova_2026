# ============================================
# Docker Compose - Entorno UAT/Desarrollo
# ============================================
#
# Este entorno es para UAT (User Acceptance Testing)
# NO es para desarrollo activo con hot reload
#
# Uso:
#   docker-compose -f docker-compose.dev.yml up -d --build
#
# Variables de entorno opcionales (archivo .env):
#   VITE_API_URL - URL del backend UAT (default: http://192.168.1.139:8082/Enerlova)
#   DEV_PORT - Puerto para UAT (default: 3000)
#
version: "3.8"

services:
  # Frontend UAT/Development (con nginx, como producción)
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development-nginx
      args:
        VITE_API_URL: ${VITE_API_URL:-http://192.168.1.139:8082/Enerlova}
        NODE_ENV: development
        VITE_APP_ENV: development

    image: enerlova-frontend:dev-uat

    container_name: enerlova-frontend-dev

    ports:
      - "${DEV_PORT:-3000}:80"

    environment:
      - NODE_ENV=development
      - VITE_APP_ENV=development

    networks:
      - enerlova-dev-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Limitar recursos (similar a producción pero más permisivo)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    # Logging para UAT
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  enerlova-dev-network:
    driver: bridge
