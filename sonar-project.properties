sonar.projectKey=Enerlova-front
sonar.projectName=Enerlova Frontend
sonar.projectVersion=1.0

# Directorios de código fuente
sonar.sources=app
sonar.tests=app

# Exclusiones
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/*.config.js,**/*.config.ts,**/public/**,.react-router/**
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.config.js,**/*.config.ts

# Reportes de cobertura
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Configuración de análisis
sonar.sourceEncoding=UTF-8

# Umbrales de calidad
# Comentado temporalmente para no bloquear el build mientras se mejora la cobertura
# sonar.qualitygate.wait=true
sonar.qualitygate.wait=false

# Configuración TypeScript
sonar.typescript.tsconfigPath=tsconfig.json
