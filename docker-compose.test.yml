services:
  frontend:
    image: enerlova-frontend:test
    container_name: enerlova-frontend-test
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://enerlovauat.mmlovalledor.cl/Enerlova
        VITE_APP_ENV: test
    environment:
      - NODE_ENV=production
      - VITE_APP_ENV=test
    ports:
      - "32010:80"
    networks:
      - enerlova-test
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  enerlova-test:
    driver: bridge