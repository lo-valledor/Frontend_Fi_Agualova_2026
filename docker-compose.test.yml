# docker-compose.test.yml - Entorno de Pruebas (Automático)
version: "3.8"

services:
  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Apunta al backend de TEST (enerlovauat.mmlovalledor.cl)
        VITE_API_URL: https://enerlovauat.mmlovalledor.cl/Enerlova
        VITE_APP_ENV: production # Usamos build de prod pero config de test
    ports:
      - "6001:80"
    container_name: enerlova-frontend-test
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_APP_ENV=production
    networks:
      - enerlova-network

networks:
  enerlova-network:
    driver: bridge
